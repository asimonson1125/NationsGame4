{# --- read mode --- #}
<div x-show="!editingDesc">
    {% if nation.description %}
    <p class="text-slate-300 whitespace-pre-line">{{ nation.description }}</p>
    {% else %}
    <p class="text-slate-500 italic text-sm">No description yet. Click Edit to add one.</p>
    {% endif %}
</div>
{# --- edit mode --- #}
<form x-show="editingDesc" x-cloak
      hx-post="{{ url_for('main.update_description') }}"
      hx-target="#nation-description"
      hx-swap="innerHTML"
      @htmx:after-request.window="if ($event.detail.successful) editingDesc = false"
      class="space-y-2">
    <textarea name="new_description" rows="3"
              placeholder="Describe your country..."
              class="w-full px-3 py-2 bg-slate-700 border border-slate-600 text-slate-100 rounded-md placeholder-slate-400 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500/50 resize-y font-sans text-sm">{{ nation.description }}</textarea>
    <div class="flex justify-end">
        <button type="submit"
                class="px-4 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-md transition-colors font-semibold text-sm">
            Save
        </button>
    </div>
</form>
