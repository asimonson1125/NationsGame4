{% extends layout %}

{% block title %}Changelog{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-10">

    <div class="flex items-center gap-3 mb-8">
        <i class="fas fa-scroll text-amber-500 text-xl"></i>
        <h1 class="text-2xl font-bold text-slate-100">Version History</h1>
        {% if latest_update %}
        <span class="ml-auto text-xs bg-amber-500/10 text-amber-500 border border-amber-500/30 px-2 py-0.5 rounded font-mono font-semibold">v{{ latest_update.version }}</span>
        {% endif %}
    </div>

    <div class="space-y-6">
        {% for entry in changelog %}
        <div class="bg-slate-800 rounded-lg border border-slate-700 p-5 {% if loop.first %}border-l-4 border-l-amber-500{% endif %}">
            <div class="flex items-center gap-3 mb-2">
                <span class="text-xs font-mono font-semibold bg-slate-700 text-slate-300 px-2 py-0.5 rounded">v{{ entry.version }}</span>
                <span class="text-xs text-slate-500">{{ entry.date }}</span>
            </div>
            <h2 class="text-lg font-semibold text-slate-100 mb-2">{{ entry.title }}</h2>
            <p class="text-sm text-slate-300 leading-relaxed">{{ entry.body }}</p>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
