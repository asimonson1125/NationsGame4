{% extends 'layouts/bare.html' %}

{% block title %}Verify Your Email{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-10 px-4">
    <div class="bg-slate-800 rounded-xl border border-slate-700 border-t-4 border-t-amber-500 p-8 w-full max-w-sm text-center">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Nations Engine" class="w-10 h-10 mx-auto mb-4">
        <div class="w-14 h-14 rounded-full bg-amber-500/10 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-envelope text-amber-400 text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-100 mb-2">Check your inbox</h1>
        <p class="text-slate-400 text-sm mb-6">We sent a verification link to your email address. Click it to activate your account.</p>
        <p class="text-slate-500 text-xs">The link expires in 72 hours. Didn't receive it?
            <a href="{{ url_for('auth.resend_verification') }}" class="text-amber-500 hover:text-amber-400">Resend</a>
        </p>
    </div>
</div>
{% endblock %}
