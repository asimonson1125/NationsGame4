{% extends 'layouts/bare.html' %}

{% block title %}Email Verified{% endblock %}

{% block head %}
<meta http-equiv="refresh" content="3;url={{ url_for('main.home', _external=True) }}">
{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-10 px-4">
    <div class="bg-slate-800 rounded-xl border border-slate-700 border-t-4 border-t-amber-500 p-8 w-full max-w-sm text-center">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Nations Engine" class="w-10 h-10 mx-auto mb-4">
        <div class="w-14 h-14 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check text-green-400 text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-100 mb-2">Email Verified!</h1>
        <p class="text-slate-400 text-sm mb-4">Your email address has been verified. Redirecting you to the game&hellip;</p>
        <a href="{{ url_for('main.home') }}" class="text-amber-500 hover:text-amber-400 text-sm">Go now &rarr;</a>
    </div>
</div>
{% endblock %}
