<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nations Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10 font-sans">
    <div class="bg-white rounded-xl shadow-md p-8 w-full max-w-md mx-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-1 text-center">Create Your Nation</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Found a new nation and begin your legacy</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="mb-4 p-3 rounded text-sm
                    {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
                    {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.register') }}" class="flex flex-col gap-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" autocomplete="username" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/25">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nation Name</label>
                <input type="text" name="nation_name" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/25"
                       placeholder="e.g. Appalachia, Westberg...">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" autocomplete="new-password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/25">
                <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" autocomplete="new-password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/25">
            </div>
            <button type="submit"
                    class="w-full py-2.5 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 transition-colors mt-1">
                Found Nation
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-5">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline font-medium">Login</a>
        </p>
    </div>
</body>
</html>
