<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1c2332">
    <title>{% block title %}Nations Simulator{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50:  '#f4f5f7',
                            100: '#e7e9ed',
                            200: '#ced1d8',
                            300: '#adb2bc',
                            400: '#8a919f',
                            500: '#6b7486',
                            600: '#545d70',
                            700: '#404a5c',
                            800: '#2f3848',
                            900: '#252d3c',
                            950: '#1c2332',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 font-sans">
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
